<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Halaman Tidak Ditemukan</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- Tailwind CSS Play CDN for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
          colors: {
            'dark-bg': '#0b0f19',
            'accent-indigo': '#6366f1',
            'accent-teal': '#14b8a6',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0b0f19;
      background-image: radial-gradient(circle 800px at 50% 50%, rgba(99, 102, 241, 0.08), transparent 80%);
    }
    .glassmorphism {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body class="min-h-screen text-gray-100 flex items-center justify-center p-6 antialiased font-sans">
  
  <div class="max-w-md w-full text-center glassmorphism p-8 sm:p-10 rounded-2xl shadow-2xl relative overflow-hidden">
    <!-- Glowing background accent -->
    <div class="absolute -top-12 -left-12 w-24 h-24 rounded-full bg-accent-indigo/10 blur-xl pointer-events-none"></div>
    <div class="absolute -bottom-12 -right-12 w-24 h-24 rounded-full bg-accent-teal/10 blur-xl pointer-events-none"></div>
    
    <!-- Big 404 title -->
    <h1 class="text-7xl font-black bg-gradient-to-r from-accent-indigo via-purple-500 to-accent-teal bg-clip-text text-transparent tracking-tight mb-4 select-none">
      404
    </h1>
    
    <h2 class="text-xl font-bold text-white mb-2">Halaman Tidak Ditemukan</h2>
    <p class="text-gray-400 text-sm leading-relaxed mb-8">
      Sepertinya halaman yang Anda cari telah dipindahkan, dihapus, atau alamat URL yang dimasukkan salah.
    </p>
    
    <!-- CTA Button -->
    <a 
      href="/"
      class="inline-flex w-full py-3 px-6 rounded-xl bg-gradient-to-r from-accent-indigo to-purple-600 hover:shadow-[0_0_20px_rgba(99,102,241,0.4)] text-white font-medium text-sm items-center justify-center gap-2 transition-all duration-300 transform hover:-translate-y-0.5"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      <span>Kembali ke Beranda</span>
    </a>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Halaman Tidak Ditemukan</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  
  <!-- Font system fallback matching index.css -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  
  <!-- Theme Checker Script -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  
  <!-- Tailwind Play CDN configured with index.css palette -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            'accent-violet': '#8b5cf6',
            'accent-indigo': '#3b82f6', // Cobalt Blue
            'accent-teal': '#0ea5e9',   // Sky/teal accent
          }
        }
      }
    }
  </script>
  
  <style>
    /* Radial gradients matching portfolio background overlay style */
    .bg-grid-light {
      background-color: #e2e8f0;
      background-image: radial-gradient(circle 800px at 50% 50%, rgba(59, 130, 246, 0.05), transparent 80%);
    }
    .dark .bg-grid-dark {
      background-color: #0a0a0f;
      background-image: radial-gradient(circle 800px at 50% 50%, rgba(59, 130, 246, 0.08), transparent 80%);
    }
    .glassmorphism {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(15, 23, 42, 0.08);
      box-shadow: 0 8px 32px 0 rgba(15, 23, 42, 0.04);
    }
    .dark .glassmorphism {
      background: rgba(19, 19, 26, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body class="min-h-screen transition-colors duration-300 text-slate-800 dark:text-zinc-200 flex items-center justify-center p-6 antialiased font-sans bg-grid-light dark:bg-grid-dark">
  
  <div class="max-w-md w-full text-center glassmorphism p-8 sm:p-10 rounded-2xl relative overflow-hidden">
    <!-- Subtle glow accents matching portfolio style -->
    <div class="absolute -top-12 -left-12 w-24 h-24 rounded-full bg-accent-indigo/10 blur-xl pointer-events-none"></div>
    <div class="absolute -bottom-12 -right-12 w-24 h-24 rounded-full bg-accent-teal/10 blur-xl pointer-events-none"></div>
    
    <!-- Big 404 title with portfolio color gradients -->
    <h1 class="text-7xl sm:text-8xl font-black font-display bg-gradient-to-r from-accent-indigo via-accent-violet to-accent-teal bg-clip-text text-transparent tracking-tight mb-4 select-none">
      404
    </h1>
    
    <h2 class="text-xl font-bold font-display text-slate-900 dark:text-white mb-2">Halaman Tidak Ditemukan</h2>
    <p class="text-slate-600 dark:text-zinc-400 text-sm leading-relaxed mb-8">
      Sepertinya halaman yang Anda cari telah dipindahkan, dihapus, atau alamat URL yang dimasukkan salah.
    </p>
    
    <!-- CTA Button matching portfolio styling -->
    <a 
      href="/"
      class="inline-flex w-full py-3.5 px-6 rounded-xl bg-accent-indigo hover:bg-accent-indigo/90 shadow-[0_4px_12px_rgba(59,130,246,0.15)] dark:shadow-[0_0_20px_rgba(59,130,246,0.25)] text-white font-medium text-sm items-center justify-center gap-2 transition-all duration-300 transform hover:-translate-y-0.5"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      <span>Kembali ke Beranda</span>
    </a>
  </div>

</body>
</html>
